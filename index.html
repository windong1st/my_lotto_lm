<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 로또 데이터 분석 센터</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --primary: #fbc02d; --secondary: #4caf50; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Pretendard', sans-serif; text-align: center; padding: 20px; }
        .container { max-width: 850px; margin: 0 auto; background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* 상단 컨트롤 영역 */
        .controls { background: #2a2a2a; padding: 20px; border-radius: 15px; margin-bottom: 25px; display: flex; justify-content: center; align-items: center; gap: 15px; flex-wrap: wrap; }
        select { background: #333; color: #fff; border: 1px solid var(--primary); padding: 10px; border-radius: 8px; font-size: 1em; cursor: pointer; }
        
        .section { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 15px; margin-bottom: 20px; text-align: left; border: 1px solid #333; }
        .section h2 { margin-top: 0; font-size: 1.1em; color: var(--primary); border-bottom: 1px solid #444; padding-bottom: 10px; margin-bottom: 15px; }
        
        button { background: var(--primary); color: #000; border: none; padding: 12px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:disabled { background: #555; cursor: not-allowed; }
        
        .ball-container { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; min-height: 45px; }
        .ball { width: 40px; height: 40px; line-height: 40px; border-radius: 50%; color: #fff; font-weight: bold; text-align: center; font-size: 1.1em; }
        .plus { font-weight: bold; color: #888; }

        /* 공 색상 */
        .c1 { background: #fbc400; color: #000; } .c2 { background: #69c8f2; } .c3 { background: #ff7272; } 
        .c4 { background: #aaaaaa; } .c5 { background: #b0d840; }

        #log { font-size: 0.8em; color: #888; background: #000; padding: 12px; border-radius: 10px; height: 80px; overflow-y: auto; margin-top: 10px; }
        .highlight-text { color: var(--secondary); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎯 로또 패턴 분석 랩</h1>
    <p style="color:#888; margin-bottom: 20px;">엑셀 데이터를 기반으로 한 기간별 맞춤 분석</p>

    <div class="controls">
        <label for="rangeSelect">📊 분석 범위 설정:</label>
        <select id="rangeSelect">
            <option value="10">최근 10회차</option>
            <option value="20">최근 20회차</option>
            <option value="50">최근 50회차</option>
            <option value="100">최근 100회차</option>
            <option value="200">최근 200회차</option>
            <option value="500">최근 500회차</option>
            <option value="all" selected>전체 회차 분석</option>
        </select>
        <button id="updateBtn">데이터 갱신</button>
    </div>

    <div class="section">
        <h2>✅ 선택된 범위 분석 요약</h2>
        <div id="statSummary" style="font-size: 0.95em;"></div>
        <div style="margin-top:15px;">
            <strong>해당 기간 가장 많이 나온 번호 (TOP 6)</strong>
            <div class="ball-container" id="frequentBalls" style="margin-top:10px;"></div>
        </div>
    </div>

    <div class="section">
        <h2>🤖 AI 딥러닝 예측 (선택 범위 학습)</h2>
        <div id="aiResultArea" class="ball-container" style="justify-content: center; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 10px; margin-bottom: 15px;">
            버튼을 누르면 학습을 시작합니다.
        </div>
        <div id="log">데이터 로딩 대기 중...</div>
        <button id="runAiBtn" style="width: 100%; background: var(--secondary); color: white; margin-top: 10px;">
            현재 범위 데이터로 AI 학습 시작
        </button>
    </div>
</div>

<script>
    let rawLottoData = [];
    let currentSubset = [];
    
    const rangeSelect = document.getElementById('rangeSelect');
    const updateBtn = document.getElementById('updateBtn');
    const runAiBtn = document.getElementById('runAiBtn');
    const logDiv = document.getElementById('log');

    function logger(msg) {
        logDiv.innerText += `\n> ${msg}`;
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    function getBallColorClass(num) {
        if (num <= 10) return 'c1'; if (num <= 20) return 'c2';
        if (num <= 30) return 'c3'; if (num <= 40) return 'c4';
        return 'c5';
    }

    // 1. 초기 데이터 로드
    async function loadData() {
        try {
            const response = await fetch('./lotto_data.json');
            rawLottoData = await response.json();
            rawLottoData.sort((a, b) => a.drwNo - b.drwNo);
            logger(`시스템: ${rawLottoData.length}개의 전체 회차 데이터 로드 완료.`);
            updateAnalysis();
        } catch (e) {
            logger("에러: lotto_data.json 파일을 찾을 수 없습니다.");
        }
    }

    // 2. 콤보박스 선택에 따른 데이터 필터링 및 통계 업데이트
    function updateAnalysis() {
        const range = rangeSelect.value;
        if (range === 'all') {
            currentSubset = [...rawLottoData];
        } else {
            const count = parseInt(range);
            currentSubset = rawLottoData.slice(-count);
        }

        const firstDraw = currentSubset[0].drwNo;
        const lastDraw = currentSubset[currentSubset.length - 1].drwNo;

        document.getElementById('statSummary').innerHTML = 
            `현재 <span class="highlight-text">${currentSubset.length}개 회차</span> 분석 중 
            (${firstDraw}회 ~ ${lastDraw}회)`;

        // 최다 빈도 번호 계산
        const freqMap = {};
        currentSubset.forEach(draw => {
            draw.numbers.forEach(num => {
                freqMap[num] = (freqMap[num] || 0) + 1;
            });
        });

        const sortedNums = Object.entries(freqMap)
            .sort((a, b) => b[1] - a[1])
            .slice(0, 6)
            .map(entry => parseInt(entry[0]))
            .sort((a, b) => a - b);

        document.getElementById('frequentBalls').innerHTML = sortedNums.map(n => 
            `<div class="ball ${getBallColorClass(n)}">${n}</div>`
        ).join('');
        
        logger(`${rangeSelect.options[rangeSelect.selectedIndex].text} 기반 통계 갱신 완료.`);
    }

    // 3. 선택된 범위로 AI 학습 진행
    async function runAI() {
        if (currentSubset.length < 5) {
            alert("학습 데이터가 너무 적습니다. 범위를 더 넓게 설정하세요.");
            return;
        }

        runAiBtn.disabled = true;
        document.getElementById('aiResultArea').innerHTML = "학습 및 패턴 분석 중...";
        logger("AI: 딥러닝 모델 초기화 중...");

        const lottoNumbers = currentSubset.map(d => d.numbers);
        const xData = lottoNumbers.slice(0, -1).map(nums => nums.map(v => v / 45));
        const yData = lottoNumbers.slice(1).map(nums => nums.map(v => v / 45));

        const xs = tf.tensor2d(xData);
        const ys = tf.tensor2d(yData);

        const model = tf.sequential();
        model.add(tf.layers.dense({units: 128, activation: 'relu', inputShape: [6]}));
        model.add(tf.layers.dense({units: 64, activation: 'relu'}));
        model.add(tf.layers.dense({units: 6}));
        model.compile({optimizer: 'adam', loss: 'meanSquaredError'});

        logger(`AI: 최근 ${currentSubset.length}개 데이터를 학습합니다...`);

        await model.fit(xs, ys, {
            epochs: 200,
            callbacks: {
                onEpochEnd: (epoch, logs) => {
                    if(epoch % 50 === 0) logger(`학습 진행: ${Math.round((epoch/200)*100)}% (Loss: ${logs.loss.toFixed(4)})`);
                }
            }
        });

        // 마지막 데이터로 예측
        const lastInput = tf.tensor2d([lottoNumbers[lottoNumbers.length - 1].map(v => v / 45)]);
        const prediction = model.predict(lastInput);
        const pData = await prediction.data();

        let resultNums = Array.from(pData).map(v => Math.round(v * 45));
        resultNums = [...new Set(resultNums)].filter(v => v >= 1 && v <= 45);

        // 6개 미만 시 랜덤 보정
        while(resultNums.length < 6) {
            let r = Math.floor(Math.random() * 45) + 1;
            if(!resultNums.includes(r)) resultNums.push(r);
        }
        resultNums.sort((a, b) => a - b);

        document.getElementById('aiResultArea').innerHTML = resultNums.map(n => 
            `<div class="ball ${getBallColorClass(n)}">${n}</div>`
        ).join('');

        logger("AI: 패턴 추출 완료. 결과가 화면에 표시되었습니다.");
        
        // 메모리 해제
        xs.dispose(); ys.dispose(); lastInput.dispose(); model.dispose();
        runAiBtn.disabled = false;
    }

    updateBtn.addEventListener('click', updateAnalysis);
    runAiBtn.addEventListener('click', runAI);
    window.addEventListener('DOMContentLoaded', loadData);
</script>

</body>
</html>
