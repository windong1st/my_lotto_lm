<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 로또 종합 분석기</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --primary: #fbc02d; --secondary: #4caf50; --tertiary: #2196f3; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Pretendard', -apple-system, sans-serif; text-align: center; padding: 20px; line-height: 1.6; }
        .container { max-width: 800px; margin: 0 auto; background: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: var(--primary); margin-bottom: 5px; }
        .info-text { color: #888; font-size: 0.9em; margin-bottom: 30px; }
        
        .section { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; margin-bottom: 20px; text-align: left; }
        .section h2 { margin-top: 0; font-size: 1.2em; border-bottom: 1px solid #444; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        
        button { background: var(--primary); color: #000; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { opacity: 0.8; }
        button:disabled { background: #555; cursor: wait; }
        
        .btn-ai { background: var(--secondary); color: #fff; width: 100%; padding: 15px; font-size: 1.1em; margin-top: 10px; }
        
        .ball-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; align-items: center; }
        .ball { width: 40px; height: 40px; line-height: 40px; border-radius: 50%; color: #fff; font-weight: bold; font-size: 1.1em; text-align: center; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
        .ball.bns { border: 2px solid #fff; line-height: 36px; } /* 보너스볼 표시 */
        .plus { font-weight: bold; font-size: 1.2em; margin: 0 5px; color: #888; }
        
        /* 동행복권 공식 공 색상 */
        .c1 { background: #fbc400; color: #333; text-shadow: none; } /* 1~10 */
        .c2 { background: #69c8f2; } /* 11~20 */
        .c3 { background: #ff7272; } /* 21~30 */
        .c4 { background: #aaaaaa; } /* 31~40 */
        .c5 { background: #b0d840; } /* 41~45 */

        #log { margin-top: 15px; font-size: 0.85em; color: #aaa; background: #000; padding: 10px; border-radius: 8px; height: 80px; overflow-y: auto; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 AI & 통계 로또 분석기</h1>
    <p class="info-text">GitHub 정적 서버와 브라우저 리소스를 활용한 100% Client-Side 분석</p>
    
    <div class="section" id="overviewSection">
        <h2>최근 당첨 결과 <span id="totalDraws" style="font-size: 0.8em; color: #888; font-weight: normal;">데이터 로딩 중...</span></h2>
        <div id="latestDrawInfo" style="color: #bbb; font-size: 0.9em; margin-bottom: 10px;"></div>
        <div class="ball-container" id="latestDrawBalls"></div>
    </div>

    <div class="section">
        <h2>📈 역대 & 최근 트렌드 분석</h2>
        <div style="margin-bottom: 15px;">
            <strong>역대 최다 출현 번호 TOP 6</strong>
            <div class="ball-container" id="topAllTime">데이터 로딩 중...</div>
        </div>
        <div>
            <strong>최근 10주간 최다 출현 번호 TOP 6</strong>
            <div class="ball-container" id="topRecent">데이터 로딩 중...</div>
        </div>
    </div>

    <div class="section">
        <h2>🤖 AI 딥러닝 다음 회차 예측</h2>
        <p style="font-size: 0.85em; color: #aaa; margin: 0 0 10px 0;">과거 패턴을 신경망 모델(TensorFlow.js)로 학습하여 확률이 높은 번호를 추출합니다.</p>
        <div class="ball-container" id="aiResultArea" style="min-height: 50px; justify-content: center; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 10px;">
            버튼을 눌러 AI 학습을 시작하세요.
        </div>
        <div id="log"></div>
        <button id="runAiBtn" class="btn-ai">AI 학습 및 번호 추출 시작</button>
    </div>
</div>

<script>
    // 전역 변수
    let globalLottoData = [];
    const logDiv = document.getElementById('log');
    const runAiBtn = document.getElementById('runAiBtn');

    // 공 색상 결정 함수 (동행복권 기준)
    function getBallColorClass(num) {
        if (num >= 1 && num <= 10) return 'c1';
        if (num >= 11 && num <= 20) return 'c2';
        if (num >= 21 && num <= 30) return 'c3';
        if (num >= 31 && num <= 40) return 'c4';
        if (num >= 41 && num <= 45) return 'c5';
        return '';
    }

    // 공 HTML 생성 함수
    function createBallsHtml(numbers, bonus = null) {
        let html = numbers.map(n => `<div class="ball ${getBallColorClass(n)}">${n}</div>`).join('');
        if (bonus !== null) {
            html += `<div class="plus">+</div><div class="ball bns ${getBallColorClass(bonus)}" title="보너스 번호">${bonus}</div>`;
        }
        return html;
    }

    // 로그 출력 함수
    function logger(msg) {
        logDiv.innerText += `\n> ${msg}`;
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    // 1. 데이터 로드 및 통계 처리 (페이지 로드 시 자동 실행)
    async function initData() {
        try {
            const response = await fetch('./lotto_data.json');
            if (!response.ok) throw new Error("JSON 파일을 찾을 수 없습니다.");
            
            globalLottoData = await response.json();
            
            // 회차 오름차순 정렬 보장
            globalLottoData.sort((a, b) => a.drwNo - b.drwNo);
            
            const total = globalLottoData.length;
            const latest = globalLottoData[total - 1];

            // UI: 최근 당첨 결과 업데이트
            document.getElementById('totalDraws').innerText = `총 ${total}회차 데이터 로드됨`;
            document.getElementById('latestDrawInfo').innerText = `${latest.drwNo}회차 (${latest.drwNoDate} 추첨)`;
            document.getElementById('latestDrawBalls').innerHTML = createBallsHtml(latest.numbers, latest.bnusNo);

            // 통계 계산 실행
            calculateStats();

        } catch (error) {
            document.getElementById('totalDraws').innerText = "데이터 로드 실패";
            console.error(error);
            alert("데이터를 불러오지 못했습니다. lotto_data.json 파일이 존재하는지 확인하세요.");
        }
    }

    // 2. 통계 계산 로직
    function calculateStats() {
        // 모든 번호를 담을 배열
        const allNumbers = [];
        const recentNumbers = [];

        globalLottoData.forEach((draw, index) => {
            // 본 번호 6개만 통계에 포함 (보너스 제외)
            allNumbers.push(...draw.numbers);
            
            // 최근 10회차 (총 길이 - 10 보다 큰 인덱스)
            if (index >= globalLottoData.length - 10) {
                recentNumbers.push(...draw.numbers);
            }
        });

        // 출현 빈도 카운트 함수
        const countFrequencies = (arr) => {
            const counts = {};
            arr.forEach(num => { counts[num] = (counts[num] || 0) + 1; });
            // [ [번호, 횟수], [번호, 횟수]... ] 형태로 변환 후 정렬
            return Object.entries(counts)
                         .sort((a, b) => b[1] - a[1])
                         .map(entry => parseInt(entry[0]));
        };

        const topAllTime = countFrequencies(allNumbers).slice(0, 6).sort((a,b)=>a-b);
        const topRecent = countFrequencies(recentNumbers).slice(0, 6).sort((a,b)=>a-b);

        // UI 업데이트
        document.getElementById('topAllTime').innerHTML = createBallsHtml(topAllTime);
        document.getElementById('topRecent').innerHTML = createBallsHtml(topRecent);
    }

    // 3. AI 딥러닝 예측 로직 (버튼 클릭 시 실행)
    async function runAI() {
        if (globalLottoData.length === 0) {
            alert("데이터가 준비되지 않았습니다.");
            return;
        }

        runAiBtn.disabled = true;
        const aiResultArea = document.getElementById('aiResultArea');
        aiResultArea.innerHTML = '<span style="color:#aaa;">브라우저 리소스를 사용해 학습 중입니다... (약 10~20초 소요)</span>';
        logDiv.innerText = "데이터 전처리 시작...";

        try {
            // 입력(x)과 출력(y) 데이터 세팅 (이전 회차 -> 다음 회차)
            const lottoNumbers = globalLottoData.map(d => d.numbers);
            const xData = lottoNumbers.slice(0, -1).map(nums => nums.map(v => v / 45));
            const yData = lottoNumbers.slice(1).map(nums => nums.map(v => v / 45));
            
            const xs = tf.tensor2d(xData);
            const ys = tf.tensor2d(yData);

            // 모델 구성
            const model = tf.sequential();
            model.add(tf.layers.dense({units: 128, activation: 'relu', inputShape: [6]}));
            model.add(tf.layers.dense({units: 64, activation: 'relu'}));
            model.add(tf.layers.dense({units: 6})); 

            model.compile({optimizer: 'adam', loss: 'meanSquaredError'});

            // 학습
            logger("신경망 모델 학습 시작...");
            await model.fit(xs, ys, {
                epochs: 150,
                callbacks: {
                    onEpochEnd: (epoch, logs) => {
                        if(epoch % 30 === 0) logger(`Epoch ${epoch} 진행 중... (손실율: ${logs.loss.toFixed(4)})`);
                    }
                }
            });

            // 예측
            logger("학습 완료! 다음 회차를 예측합니다.");
            const lastNumbers = tf.tensor2d([lottoNumbers[lottoNumbers.length - 1].map(v => v / 45)]);
            const prediction = model.predict(lastNumbers);
            const pData = await prediction.data();

            // 데이터 후처리 (정규화 해제 및 중복 제거)
            let resultNums = Array.from(pData).map(v => Math.round(v * 45));
            resultNums = [...new Set(resultNums)].filter(v => v >= 1 && v <= 45);
            
            // 번호가 6개가 안 되면 빈도 높은 번호나 랜덤으로 채우기
            while(resultNums.length < 6) {
                let r = Math.floor(Math.random() * 45) + 1;
                if(!resultNums.includes(r)) resultNums.push(r);
            }
            
            // 최종 6개 자르고 정렬
            resultNums = resultNums.slice(0, 6).sort((a, b) => a - b);

            // 화면 표시
            aiResultArea.innerHTML = createBallsHtml(resultNums);
            logger("분석 및 추출 완료!");

            // 메모리 정리
            xs.dispose();
            ys.dispose();
            model.dispose();

        } catch (error) {
            logger(`AI 학습 중 에러 발생: ${error.message}`);
            console.error(error);
            aiResultArea.innerHTML = '<span style="color:#ff7272;">학습 중 오류가 발생했습니다.</span>';
        } finally {
            runAiBtn.disabled = false;
        }
    }

    // 이벤트 리스너 및 초기화
    runAiBtn.addEventListener('click', runAI);
    window.addEventListener('DOMContentLoaded', initData);

</script>
</body>
</html>
